name: catalog-vision-extractor CI

on:
  push:
    branches: [main]
    paths:
      - "catalog-vision-extractor/**"
      - ".github/workflows/catalog-vision-extractor-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "catalog-vision-extractor/**"
      - ".github/workflows/catalog-vision-extractor-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: catalog-vision-extractor

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: "1"

      - name: Run tests
        run: pytest -q
