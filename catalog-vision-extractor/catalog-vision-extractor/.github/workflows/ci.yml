name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r catalog-vision-extractor/requirements.txt
          pip install pytest
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: '1'

      - name: Run tests
        env:
          PYTHONPATH: catalog-vision-extractor
        run: |
          pytest -q
